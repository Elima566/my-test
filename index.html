<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Тест</title>
</head>
<body>

<h1>Тест</h1>

<form id="quiz">

<!-- Вопросы -->
<p>1. Какой папирус был посвящён хирургии?</p>
<input type="radio" name="q1" value="1"> Кахуна

<input type="radio" name="q1" value="2"> Смита

<input type="radio" name="q1" value="3"> Эббота

<input type="radio" name="q1" value="4"> Эберса

<p>2. «Жизненные соки»</p>
<input type="radio" name="q2" value="1"> кровь, слизь, желтая желчь

<input type="radio" name="q2" value="2"> кровь, слизь, черная и желтая желчь

<input type="radio" name="q2" value="3"> пневма, кровь, флегма

<input type="radio" name="q2" value="4"> слизь, пневма, желчь

<p>3. Маска Гиппократа</p>
<input type="radio" name="q3" value="1"> болезнь

<input type="radio" name="q3" value="2"> лицо умирающего

<input type="radio" name="q3" value="3"> посмертная маска

<input type="radio" name="q3" value="4"> портрет

<!-- кнопка -->
<button type="button" onclick="check()">Проверить</button>

</form>

<h2 id="result"></h2>

<script>
function check() {
    let score = 0;

    let answers = {
        q1: "2",
        q2: "2",
        q3: "2"
    };

    for (let q in answers) {
        let selected = document.querySelector('input[name="'+q+'"]:checked');
        if (selected && selected.value === answers[q]) {
            score++;
        }
    }

    document.getElementById("result").innerText =
        "Результат: " + score + " / 3";
}
</script>

</body>
</html>
