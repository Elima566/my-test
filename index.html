<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Тесты</title>
</head>
<body>

<h1>Медицинские тесты</h1>

<div id="quiz"></div>

<button onclick="next()">Следующий</button>

<h2 id="result"></h2>

<script src="questions.js"></script>

<script>
let current = 0;
let score = 0;

function showQuestion() {
    let q = questions[current];

    let html = "<h3>" + q.q + "</h3>";

    for (let i = 0; i < q.a.length; i++) {
        html += `<p><label>
        <input type="radio" name="ans" value="${i}">
        ${q.a[i]}
        </label></p>`;
    }

    document.getElementById("quiz").innerHTML = html;
}

function next() {
    let selected = document.querySelector('input[name="ans"]:checked');

    if (selected && parseInt(selected.value) === questions[current].correct) {
        score++;
    }

    current++;

    if (current < questions.length) {
        showQuestion();
    } else {
        document.getElementById("quiz").innerHTML = "";
        document.getElementById("result").innerText =
            "Готово! Результат: " + score + " / " + questions.length;
    }
}

showQuestion();
</script>
src="questions.gs"></script> 
</body>
</html>
