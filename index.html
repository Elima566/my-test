<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои тесты</title>
</head>
<body>

<h1>Тест</h1>

<p>1. Сколько будет 2+2?</p>
<input type="radio" name="q1" value="3"> 3

<input type="radio" name="q1" value="4"> 4

<input type="radio" name="q1" value="5"> 5

<button onclick="check()">Проверить</button>

<p id="result"></p>

<script>
function check() {
    let answer = document.querySelector('input[name="q1"]:checked');
    if (!answer) {
        document.getElementById("result").innerText = "Выбери ответ";
        return;
    }

    if (answer.value === "4") {
        document.getElementById("result").innerText = "Правильно!";
    } else {
        document.getElementById("result").innerText = "Неправильно";
    }
}
</script>

</body>
</html>
